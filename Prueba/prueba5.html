<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fábrica de Talentos - Bienvenido</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617; /* Azul noche muy oscuro */
            color: #e2e8f0;
            overflow-x: hidden;
        }
        
        .hero-container {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 1rem;
        }

        .gradient-text {
            background: linear-gradient(90deg, #f97316, #d946ef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-cta {
            background: linear-gradient(90deg, #f97316, #d946ef);
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.6), 0 0 35px rgba(217, 70, 239, 0.4);
            transition: all 0.3s ease;
        }
        .btn-cta:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 0 30px rgba(249, 115, 22, 0.8), 0 0 50px rgba(217, 70, 239, 0.6);
        }

        /* Animación para la aparición del contenido */
        .fade-in-up {
            animation: fadeInUp 1s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .fade-in-up.delay-1 { animation-delay: 0.2s; }
        .fade-in-up.delay-2 { animation-delay: 0.4s; }
        .fade-in-up.delay-3 { animation-delay: 0.6s; }

    </style>
</head>
<body class="min-h-screen">

    <!-- Partículas de fondo (requiere JS) -->
    <div id="particles-js" class="fixed top-0 left-0 w-full h-full z-0"></div>

    <div class="relative z-10">
        <!-- SECCIÓN DE BIENVENIDA -->
        <section class="hero-container">
            
            <h1 class="text-5xl md:text-7xl font-black leading-tight mb-6 fade-in-up">
                Donde el <span class="gradient-text">Talento</span><br>se Transforma en Habilidad.
            </h1>

            <p class="text-lg md:text-xl text-gray-400 max-w-3xl mx-auto mb-12 fade-in-up delay-1">
                Bienvenido a la nueva era del aprendizaje. Una plataforma diseñada para forjar las competencias del mañana, tanto para individuos ambiciosos como para equipos corporativos.
            </p>

            <button class="btn-cta text-white font-bold py-4 px-12 rounded-full text-xl fade-in-up delay-2">
                PRUÉBANOS
            </button>
            
        </section>

        <!-- Aquí iría la sección de pantalla dividida que creamos antes -->
        <!-- <section class="split-screen-container"> ... </section> -->
        
    </div>

    <!-- Script para partículas de fondo -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Configuración de Particles.js para el fondo
            particlesJS('particles-js', {
                "particles": {
                    "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                    "color": { "value": "#ffffff" },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.2, "random": true },
                    "size": { "value": 2, "random": true },
                    "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.1, "width": 1 },
                    "move": { "enable": true, "speed": 1, "direction": "none", "out_mode": "out" }
                },
                "interactivity": {
                    "detect_on": "canvas",
                    "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": false }, "resize": true },
                    "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 0.3 } } }
                },
                "retina_detect": true
            });
        });
    </script>
</body>
</html>
